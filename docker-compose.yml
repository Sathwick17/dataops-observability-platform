version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: dataops_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
